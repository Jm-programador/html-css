<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    #container{
        position: relative;
        background-color: coral;
        height: 500px;
        width: 500px;
        border-radius: 50%;
        left: 40%;
        


    }
    #conteudo{
        position: absolute;
        left: 50%;
        top: 50%;
       transform: translate(-50%, -50%);
       border-radius: 50%;
        
        background-color: blue;
        height: 250px;
        width: 250px;



    }
        
        
    </style>
</head>
<body>
    <div id="container">
        <div id="conteudo">

        </div>

    </div>
    
</body>
</html>
