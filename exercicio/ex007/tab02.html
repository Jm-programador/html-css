<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <table>
         <caption>População por Estado</caption>
        <thead>
           
           <tr>
            <th scope="col">Estado</th>
            <th style="width: 150px;" scope="col">População</th>
           </tr>  

        </thead>

        <tbody>
            <tr>
                <td>São Paulo</td>
                <td class="numero">12.480.000</td>
            </tr>
            <tr>
                <td>Rio de Janeiro</td>
                <td class="numero">13.000.000</td>
            </tr>
            <tr>
                <td>Minas Gerais</td>
                <td class="numero">14.520.000</td>
            </tr>
            <tr>
                    <td>pernambuco</td>
                    <td class="numero">9.490.000</td>
                </tr>
                <tr>
                    <td>Belo horizonte</td>
                    <td class="numero">2.500.000</td>
                </tr>
                <tr>
                    <td>Salvador</td>
                    <td class="numero">2.300.000</td>
                </tr>



        </tbody>
        <tfoot>
            <th scope="row">Total</th>
            <td class="numero"><strong>40.000.000</strong></td>
                   
        
        </tfoot>
    </table>
      
    
    
</body>
</html>
