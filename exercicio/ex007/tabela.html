<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>minha primeira tabela</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            text-align: right;
            width: 400px;
            border-collapse: collapse;
        }
        td.dado {
            background-color: lightblue;
        }
        td.bola {
            background-color: lightcoral;
        }
        td.quadrado {
            background-color: lightgreen;
        }
        td.a3 {
            background-color: lightyellow;
        }
        td.triangulo {
            background-color: lightpink;
        }

        td {
            border: 1px solid black;
            padding: 10px;
        }

    </style>
</head>
<body>
    <table>
        <tr>
        <td class="dado">A1</td>
        <td>B1</td>
        <td class="triangulo">C1</td>
       </tr>

        
        <tr class="dado">
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>

        <tr>
            <td class="a3">A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        <tr>
            <td class="quadrado">A4</td>
            <td>B4</td>
            <td class="bola">C4</td>
        </tr>

    </table>
    
</body>
</html>
